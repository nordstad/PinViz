name: Update Homebrew Formula

on:
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-homebrew:
    name: Update Homebrew Formula
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: nordstad/homebrew-pinviz
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula url and sha256
        env:
          VERSION: ${{ github.event.workflow_run.head_branch }}
        run: |
          VER="${VERSION#v}"
          INFO=$(curl -sf "https://pypi.org/pypi/pinviz/${VER}/json")
          URL=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(f['url'] for f in d['urls'] if f['url'].endswith('.tar.gz')))")
          SHA=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(f['digests']['sha256'] for f in d['urls'] if f['url'].endswith('.tar.gz')))")
          FORMULA=tap/Formula/pinviz.rb
          python3 - "$FORMULA" "$URL" "$SHA" <<'PYEOF'
          import sys, re
          path, new_url, new_sha = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path) as f:
              content = f.read()
          content = re.sub(
              r'(  url ")[^"]+pinviz-[0-9][^"]+\.tar\.gz(")',
              rf'\g<1>{new_url}\g<2>',
              content,
          )
          content = re.sub(
              r'(  url "[^"]+\.tar\.gz"\n  sha256 ")[^"]+(")',
              rf'\g<1>{new_sha}\g<2>',
              content,
          )
          with open(path, "w") as f:
              f.write(content)
          print(f"Updated {path}")
          PYEOF

      - name: Open PR on tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.event.workflow_run.head_branch }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "bump-pinviz-${VERSION}"
          git add Formula/pinviz.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump pinviz to ${VERSION}"
          git push origin "bump-pinviz-${VERSION}"
          gh pr create \
            --repo nordstad/homebrew-pinviz \
            --title "chore: bump pinviz to ${VERSION}" \
            --body "Automated bump triggered by [publish workflow](https://github.com/nordstad/PinViz/actions/workflows/publish.yml)." \
            --base main \
            --head "bump-pinviz-${VERSION}"
