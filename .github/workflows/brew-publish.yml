name: Update Homebrew Formula

on:
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-homebrew:
    name: Update Homebrew Formula
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/update_tap_formula.py

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: nordstad/homebrew-pinviz
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula url and sha256
        env:
          VERSION: ${{ github.event.workflow_run.head_branch }}
        run: python3 scripts/update_tap_formula.py "${VERSION#v}" tap/Formula/pinviz.rb

      - name: Open PR on tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.event.workflow_run.head_branch }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "bump-pinviz-${VERSION}"
          git add Formula/pinviz.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump pinviz to ${VERSION}"
          git push origin "bump-pinviz-${VERSION}"
          gh pr create \
            --repo nordstad/homebrew-pinviz \
            --title "chore: bump pinviz to ${VERSION}" \
            --body "Automated bump triggered by [publish workflow](https://github.com/nordstad/PinViz/actions/workflows/publish.yml)." \
            --base main \
            --head "bump-pinviz-${VERSION}"
